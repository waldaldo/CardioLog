<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778">
  <defs>
    <!-- Fondo oscuro base -->
    <radialGradient id="glow-purple" cx="20%" cy="12%" r="45%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-teal" cx="80%" cy="88%" r="40%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="75%" cy="18%" r="30%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>

    <!-- Gradiente del icono corazón -->
    <linearGradient id="heart-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Sombra suave para el icono -->
    <filter id="icon-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6d28d9" flood-opacity="0.5"/>
    </filter>

    <!-- Brillo del ícono -->
    <radialGradient id="icon-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1284" height="2778" fill="#07070a"/>

  <!-- Luces de ambiente -->
  <rect width="1284" height="2778" fill="url(#glow-purple)"/>
  <rect width="1284" height="2778" fill="url(#glow-teal)"/>
  <rect width="1284" height="2778" fill="url(#glow-blue)"/>

  <!-- Grupo del icono centrado -->
  <g transform="translate(642, 1150)">

    <!-- Glow detrás del icono -->
    <ellipse cx="0" cy="10" rx="180" ry="150" fill="url(#icon-glow)"/>

    <!-- Fondo circular del icono -->
    <circle cx="0" cy="0" r="120" fill="#1e1b4b" opacity="0.85" filter="url(#icon-shadow)"/>
    <circle cx="0" cy="0" r="120" fill="url(#heart-grad)" opacity="0.18"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#a5b4fc" stroke-width="2" opacity="0.3"/>

    <!-- Corazón -->
    <path d="M0,42 C0,42 -68,-14 -68,-44 C-68,-75 -42,-93 0,-65 C42,-93 68,-75 68,-44 C68,-14 0,42 0,42 Z"
          fill="url(#heart-grad)" opacity="0.95"/>

    <!-- Onda de pulso sobre el corazón -->
    <polyline points="-57,-10 -35,-10 -24,-38 -11,19 3,-27 14,-5 25,-5 36,-19 47,-19 58,-19"
              fill="none" stroke="#e0e7ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Nombre de la app -->
  <text x="642" y="1370"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="100"
        font-weight="800"
        text-anchor="middle"
        letter-spacing="-1">
    <tspan fill="#ffffff">Cardio</tspan><tspan fill="#00f0ff">Log</tspan>
  </text>

  <!-- Subtítulo -->
  <text x="642" y="1452"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="34"
        font-weight="500"
        letter-spacing="5"
        text-anchor="middle"
        fill="#ffffff"
        opacity="0.45">CONTROL DE PRESIÓN ARTERIAL</text>

  <!-- Línea decorativa bajo el subtítulo -->
  <line x1="522" y1="1488" x2="762" y2="1488"
        stroke="#00f0ff" stroke-width="1.5" opacity="0.25"/>
</svg>
